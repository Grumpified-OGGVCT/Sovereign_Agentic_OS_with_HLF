version: "1.0.0"
rules:
  - id: "M-001"
    name: "Standard Library Only"
    description: "Agents may only import from the approved standard library and declared dependencies"
    allowed_prefixes:
      - "agents."
      - "hlf."
      - "fastapi"
      - "pydantic"
      - "redis"
      - "httpx"
      - "lark"
      - "tiktoken"
      - "ulid"
      - "traceloop"
      - "alembic"
      - "sqlalchemy"
      - "typer"
      - "docker"
      - "yaml"
      - "json"
      - "os"
      - "sys"
      - "re"
      - "time"
      - "pathlib"
      - "hashlib"
      - "signal"
      - "ast"
      - "sqlite3"
      - "textwrap"
      - "typing"
      - "importlib"
      - "tempfile"
    forbidden_prefixes:
      - "ctypes"
      - "cffi"
  - id: "M-002"
    name: "No Dynamic Import"
    description: "importlib.import_module with untrusted paths is forbidden"
    action: "DROP_AND_QUARANTINE"
