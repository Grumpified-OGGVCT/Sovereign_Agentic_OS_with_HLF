version: "0.2.0"
bytecode:
  format: "hlf-ast-json"
  encoding: "utf-8"
  version_prefix: "HLF-v2"
  terminator: "Ω"
  max_nodes: 1000
  gas_per_node: 1
  node_types:
    - tag: INTENT
      arity: "2+"
      immutable: false
    - tag: CONSTRAINT
      arity: "1+"
      immutable: false
    - tag: EXPECT
      arity: "1"
      immutable: false
    - tag: ACTION
      arity: "1+"
      immutable: false
    - tag: SET
      arity: 2
      immutable: true
    - tag: FUNCTION
      arity: "1+"
      pure: true
    - tag: RESULT
      arity: 2
      terminator: true
    - tag: MODULE
      arity: 1
    - tag: IMPORT
      arity: 1
    - tag: DATA
      arity: 1
