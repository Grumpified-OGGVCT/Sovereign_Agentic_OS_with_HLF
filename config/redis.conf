# Redis Config for Sovereign Agentic OS
# Focuses on persistence for Dapr statestore/pubsub backing.

# Enable Append Only File persistence
appendonly yes
appendfilename "appendonly.aof"

# Fsync every second (good balance of performance and data safety)
appendfsync everysec

# RDB snapshots just in case
save 900 1
save 300 10
save 60 10000

# Memory management
maxmemory 512mb
maxmemory-policy allkeys-lru
