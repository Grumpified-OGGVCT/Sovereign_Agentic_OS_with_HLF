# ═══════════════════════════════════════════════════════════════════
# Jules Autonomous Pipeline — Daily Sequential Task Configuration
# ═══════════════════════════════════════════════════════════════════
#
# EXECUTION MODEL:
#   - All tasks run DAILY in strict sequential order (1 → 10)
#   - Each agent inherits context from the previous agent's output
#   - Auto-apply if clean (no conflicts, all tests pass, no breaking changes)
#   - Notify user ONLY when breaking/conflicting changes are detected
#   - README update is the FINAL capstone step every cycle
#
# MERGE POLICY:
#   auto_merge:
#     enabled: true
#     conditions:
#       - all_tests_pass: true
#       - no_merge_conflicts: true
#       - no_breaking_changes: true
#       - cove_validation: "compact"   # full for >200 line changes
#       - eleven_hats_review: true
#     on_conflict: "notify_user"       # pause and alert the user
#     on_breaking_change: "notify_user" # never auto-merge breaking changes
#     on_clean: "auto_apply"           # merge + push without user input
#
# ─── Merge Policy ────────────────────────────────────────────────
merge_policy:
  auto_apply_when_clean: true
  notify_user_on:
    - merge_conflict
    - breaking_change
    - test_failure
    - coverage_decrease
    - file_deletion_attempt
    - feature_simplification_attempt
  auto_publish: true          # push to origin/main after auto-merge
  require_eleven_hats: true      # every PR goes through hats
  require_cove: "compact"     # "compact" for <200 lines, "full" for >200

# ═══════════════════════════════════════════════════════════════════
# DAILY SEQUENTIAL PIPELINE — Agents execute in order (1 → 10)
# Each agent receives the output/context of the previous agent
# ═══════════════════════════════════════════════════════════════════
daily_pipeline:
  frequency: daily
  execution: sequential       # each step waits for prior to complete
  context_aware: true         # each agent reads prior agent's report
  start_time: "02:00 UTC"    # run during off-hours
  steps:

  # ─── Step 1: HLF Grammar Evolver ─────────────────────────────
  - step: 1
    agent: hlf-grammar-evolver
    description: "Evolve HLF grammar — propose new tags, syntax extensions, expressive power improvements. Always additive, never remove."
    targets:
      - "hlf/hlfc.py"
      - "hlf/hlflint.py"
      - "hlf/hlffmt.py"
      - "hlf/hlfrun.py"
      - "docs/HLF_GRAMMAR_REFERENCE.md"
    commands:
      - "uv run python -m pytest tests/ -v -k 'hlf or hlfc or parse or lint or fmt' --tb=short"
    invariants:
      - never_remove_syntax
      - additive_only
      - expand_test_corpus
      - format_correction_feedback_loop
    eleven_hats_review: true
    output: "reports/daily/hlf-grammar-evolution.md"

  # ─── Step 2: Dream Cycle Enhancer ─────────────────────────────
  - step: 2
    agent: dream-cycle-enhancer
    description: "Enhance Dream Cycle processing — improve hat_engine, dream_state, and cognitive loop quality. Add new dream patterns, expand hat analysis depth."
    depends_on: hlf-grammar-evolver
    targets:
      - "agents/core/dream_state.py"
      - "agents/core/hat_engine.py"
    commands:
      - "uv run python -m pytest tests/ -v -k 'dream or hat' --tb=short"
    invariants:
      - never_simplify_cognitive_loops
      - additive_only
    eleven_hats_review: true
    output: "reports/daily/dream-cycle-enhancement.md"

  # ─── Step 3: ALIGN Hardener ───────────────────────────────────
  - step: 3
    agent: align-hardener
    frequency_override: "3x_per_week"   # Mon/Wed/Fri — not daily
    description: "Harden ALIGN governance — tighten sentinel rules, expand ledger coverage, add new alignment checks. Never weaken existing rules."
    depends_on: dream-cycle-enhancer
    targets:
      - "governance/ALIGN_LEDGER.yaml"
      - "agents/gateway/sentinel_gate.py"
    commands:
      - "uv run python -m pytest tests/ -v -k 'align or sentinel or policy' --tb=short"
    invariants:
      - never_weaken_governance
      - never_remove_alignment_rules
      - additive_only
    eleven_hats_review: true
    output: "reports/daily/align-hardening.md"

  # ─── Step 4: Transparency Assessor ────────────────────────────
  - step: 4
    agent: transparency-assessor
    description: "Assess and enhance system-wide transparency — GUI agent visibility, real-time HLF translation panels, routing trace visualization, ALS log streams, adjustable user levels (minimal/standard/detailed)."
    depends_on: align-hardener
    targets:
      - "gui/app.py"
      - "agents/core/logger.py"
      - "agents/gateway/router.py"
    commands:
      - "uv run python -m pytest tests/ -v -k 'gui or app or log' --tb=short"
    invariants:
      - never_reduce_visibility
      - never_hide_agent_actions
      - additive_only
    checks:
      - "All agent actions visible in GUI"
      - "HLF real-time translation panels active"
      - "Routing trace visualization functional"
      - "ALS log stream accessible"
      - "User level toggle (minimal/standard/detailed) working"
      - "Inter-agent communication logged and displayable"
    eleven_hats_review: true
    output: "reports/daily/transparency-assessment.md"

  # ─── Step 5: GUI Feature Builder ──────────────────────────────
  - step: 5
    agent: gui-feature-builder
    description: "Build and enhance GUI features — new panels, visualizations, security indicators, interaction improvements. Always additive, always transparent."
    depends_on: transparency-assessor
    targets:
      - "gui/app.py"
      - "gui/"
    commands:
      - "uv run python -m pytest tests/ -v -k 'gui or app' --tb=short"
    invariants:
      - never_remove_gui_features
      - maintain_transparency_panels
      - additive_only
    eleven_hats_review: true
    output: "reports/daily/gui-feature-build.md"

  # ─── Step 6: Gemini Model Integrator ──────────────────────────
  - step: 6
    agent: gemini-model-integrator
    description: "Track and integrate upgraded Gemini models and services — add new models to registry, update tier walk, benchmark via ollama-matrix-sync. Include vision, code execution, grounding services."
    depends_on: gui-feature-builder
    targets:
      - "agents/core/db.py"
      - "agents/gateway/router.py"
      - "config/settings.json"
    commands:
      - "uv run python -m pytest tests/test_db.py tests/test_router_v2.py -v --tb=short"
    invariants:
      - proper_api_key_management
      - tier_walk_integrity
    eleven_hats_review: true
    output: "reports/daily/gemini-integration.md"

  # ─── Step 7: Self-Capability Tracker ──────────────────────────
  - step: 7
    agent: self-capability-tracker
    description: "Update Jules capability manifest — what Jules CAN do, CANNOT yet do, and COULD do with enhancements. Propose enhancement issues with label 'jules-enhancement'. Never overstate capabilities."
    depends_on: gemini-model-integrator
    targets:
      - "config/jules_capabilities.yaml"
      - "reports/jules_capability_log.md"
    auto_create_issues: true
    issue_label: "jules-enhancement"
    invariants:
      - never_overstate_capabilities
      - must_pass_eleven_hats
    eleven_hats_review: true
    output: "reports/daily/self-capability-update.md"

  # ─── Step 8: CI Fixer ─────────────────────────────────────────
  - step: 8
    agent: ci-fixer
    description: "Fix any CI failures from today's pipeline — resolve test failures, workflow issues, dependency problems. Event-triggered by any failure in steps 1-7."
    depends_on: self-capability-tracker
    trigger: on_failure     # also runs if any prior step had CI issues
    targets:
      - ".github/workflows/"
      - "pyproject.toml"
      - "any failing file"
    commands:
      - "uv run python -m pytest tests/ -v --tb=short"
      - "uv run ruff check . --fix"
    invariants:
      - never_delete_tests
      - never_reduce_coverage
    eleven_hats_review: true
    output: "reports/daily/ci-fixes.md"

  # ─── Step 9: HLF Maximizer ────────────────────────────────────
  - step: 9
    agent: hlf-maximizer
    description: "Maximize HLF agent power — expand compiler test coverage, add linter rules, grow test corpus with adversarial inputs, keep docs current. Final HLF quality gate."
    depends_on: ci-fixer
    targets:
      - "hlf/"
      - "tests/"
      - "docs/"
    commands:
      - "uv run python -m pytest tests/ -v --tb=short"
    invariants:
      - test_count_gte_217
      - coverage_gte_baseline
      - never_simplify_hlf
      - additive_only
    eleven_hats_review: true
    output: "reports/daily/hlf-maximization.md"

  # ─── Step 10: README Updater (CAPSTONE) ───────────────────────
  - step: 10
    agent: readme-updater
    description: "Final capstone — update README.md to reflect ALL changes from today's pipeline run. Ensure architecture diagrams, feature lists, governance sections, and tech stack are current. This is the public face of the project."
    depends_on: hlf-maximizer
    targets:
      - "README.md"
      - "docs/"
    invariants:
      - never_remove_readme_sections
      - reflect_all_daily_changes
      - additive_only
    eleven_hats_review: true
    output: "reports/daily/readme-update.md"
    capstone: true            # marks this as the final step

# ═══════════════════════════════════════════════════════════════════
# Suggested Tasks (Auto-Surface between runs)
# ═══════════════════════════════════════════════════════════════════
suggested:
  enabled: true
  scan_patterns:
    - "TODO"
    - "FIXME"
    - "HACK"
    - "XXX"
    - "OPTIMIZE"
    - "SECURITY"
  exclude_paths:
    - "node_modules/"
    - ".venv/"
    - "__pycache__/"
    - "copilot_changes.diff"
  auto_create_issues: false
  min_priority: "medium"

# ═══════════════════════════════════════════════════════════════════
# Global Invariants (Apply to ALL pipeline steps)
# ═══════════════════════════════════════════════════════════════════
global_invariants:
  no_test_deletion: true
  no_coverage_reduction: true
  additive_only: true
  ram_constraint_gb: 4
  cloud_isolation: true
  gas_enforcement: true
  align_enforcement: true
  merkle_chain: true
  no_transparency_reduction: true
  no_feature_simplification: true
  eleven_hats_on_all_prs: true
  no_scope_reduction: true
  no_reductive_changes: true

# ═══════════════════════════════════════════════════════════════════
# Anti-Reduction Checklist (Enforced on every PR before merge)
# ═══════════════════════════════════════════════════════════════════
anti_reduction_checklist:
  - "No files deleted"
  - "No tests removed or weakened"
  - "No features simplified or scope-reduced"
  - "No transparency features hidden or removed"
  - "No governance rules weakened"
  - "No model capabilities reduced"
  - "Coverage >= baseline"
  - "Test count >= baseline"
  - "Eleven Hats review completed"
  - "CoVE validation passed (compact or full)"
  - "README updated to reflect changes"
