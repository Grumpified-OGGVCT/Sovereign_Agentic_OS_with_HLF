<svg width="1200" height="860" viewBox="0 0 1200 860" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Sovereign Agentic OS visual brief</title>
  <desc id="desc">An infographic showing the seven architectural layers, the guarded intent execution path, and the deployment and memory operating envelopes of the Sovereign Agentic OS with HLF.</desc>
  <defs>
    <linearGradient id="bg" x1="80" y1="40" x2="1120" y2="820" gradientUnits="userSpaceOnUse">
      <stop stop-color="#101826"/>
      <stop offset="1" stop-color="#0D1117"/>
    </linearGradient>
    <linearGradient id="blueCard" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#16243A"/>
      <stop offset="1" stop-color="#101826"/>
    </linearGradient>
    <linearGradient id="purpleCard" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#22183A"/>
      <stop offset="1" stop-color="#101826"/>
    </linearGradient>
    <linearGradient id="greenCard" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#162B1F"/>
      <stop offset="1" stop-color="#101826"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <style>
      .title { font: 700 36px Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; fill: #F0F6FC; }
      .subtitle { font: 500 16px Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; fill: #8B949E; }
      .section { font: 700 18px Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; fill: #F0F6FC; letter-spacing: 0.4px; }
      .caption { font: 500 13px Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; fill: #8B949E; }
      .label { font: 600 14px Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; fill: #F0F6FC; }
      .body { font: 500 12px Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; fill: #C9D1D9; }
      .metric { font: 700 22px Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; fill: #F0F6FC; }
      .metricLabel { font: 600 11px Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; fill: #8B949E; letter-spacing: 0.6px; }
      .mono { font: 600 12px 'JetBrains Mono', monospace; fill: #58A6FF; }
    </style>
  </defs>

  <rect x="24" y="24" width="1152" height="812" rx="28" fill="url(#bg)" stroke="#30363D" stroke-width="2"/>

  <text x="64" y="88" class="title">Sovereign Agentic OS — visual brief</text>
  <text x="64" y="116" class="subtitle">A single-screen map of the repo’s layered architecture, deterministic guardrails, and operating envelopes.</text>

  <rect x="64" y="152" width="326" height="620" rx="24" fill="url(#purpleCard)" stroke="#30363D" filter="url(#shadow)"/>
  <text x="92" y="198" class="section">01 · Seven-layer stack</text>
  <text x="92" y="224" class="caption">The repo is organized as a sovereign control plane, from physical confinement to auditability.</text>

  <g transform="translate(92 252)">
    <rect width="270" height="54" rx="14" fill="#161B22" stroke="#58A6FF" stroke-width="1.5"/>
    <text x="18" y="24" class="label">7 — Observability</text>
    <text x="18" y="40" class="body">Merkle-chained ALS logs, traces, and live transparency surfaces.</text>
  </g>
  <g transform="translate(92 318)">
    <rect width="270" height="54" rx="14" fill="#161B22" stroke="#BC8CFF" stroke-width="1.5"/>
    <text x="18" y="24" class="label">6 — Governance</text>
    <text x="18" y="40" class="body">ALIGN Ledger, host function policy, and deterministic enforcement.</text>
  </g>
  <g transform="translate(92 384)">
    <rect width="270" height="54" rx="14" fill="#161B22" stroke="#3FB950" stroke-width="1.5"/>
    <text x="18" y="24" class="label">5 — Data / Registry</text>
    <text x="18" y="40" class="body">SQLite registry, fact store, and memory-tier coordination.</text>
  </g>
  <g transform="translate(92 450)">
    <rect width="270" height="54" rx="14" fill="#161B22" stroke="#D29922" stroke-width="1.5"/>
    <text x="18" y="24" class="label">4 — Logic / HLF</text>
    <text x="18" y="40" class="body">Lark compiler, bytecode VM, formatter, and static linting.</text>
  </g>
  <g transform="translate(92 516)">
    <rect width="270" height="54" rx="14" fill="#161B22" stroke="#58A6FF" stroke-width="1.5"/>
    <text x="18" y="24" class="label">3 — Service Bus</text>
    <text x="18" y="40" class="body">Gateway Bus, MoMA Router, Redis streams, and API ingress.</text>
  </g>
  <g transform="translate(92 582)">
    <rect width="270" height="54" rx="14" fill="#161B22" stroke="#BC8CFF" stroke-width="1.5"/>
    <text x="18" y="24" class="label">2 — Kernel / Identity</text>
    <text x="18" y="40" class="body">Memory Scribe, Dream State, and identity-preserving recall.</text>
  </g>
  <g transform="translate(92 648)">
    <rect width="270" height="54" rx="14" fill="#161B22" stroke="#3FB950" stroke-width="1.5"/>
    <text x="18" y="24" class="label">1 — Physical / ACFS</text>
    <text x="18" y="40" class="body">Filesystem confinement, seccomp, worktrees, and container limits.</text>
  </g>

  <rect x="420" y="152" width="406" height="620" rx="24" fill="url(#blueCard)" stroke="#30363D" filter="url(#shadow)"/>
  <text x="448" y="198" class="section">02 · Guarded intent flight path</text>
  <text x="448" y="224" class="caption">Every request is translated into HLF and forced through deterministic gates before any tool executes.</text>

  <g transform="translate(448 266)">
    <rect width="350" height="56" rx="16" fill="#0D1117" stroke="#58A6FF" stroke-width="1.5"/>
    <circle cx="28" cy="28" r="15" fill="#58A6FF"/>
    <text x="22" y="33" class="mono" fill="#0D1117">1</text>
    <text x="56" y="25" class="label">Intent intake</text>
    <text x="56" y="41" class="body">Natural language or HLF arrives via the Gateway Bus.</text>
  </g>
  <path d="M623 324V346" stroke="#58A6FF" stroke-width="3" stroke-linecap="round" stroke-dasharray="7 7"/>
  <g transform="translate(448 350)">
    <rect width="350" height="56" rx="16" fill="#0D1117" stroke="#BC8CFF" stroke-width="1.5"/>
    <circle cx="28" cy="28" r="15" fill="#BC8CFF"/>
    <text x="22" y="33" class="mono" fill="#0D1117">2</text>
    <text x="56" y="25" class="label">Compile + lint</text>
    <text x="56" y="41" class="body">`validate_hlf()` and `hlfc.compile()` normalize the request into AST form.</text>
  </g>
  <path d="M623 408V430" stroke="#BC8CFF" stroke-width="3" stroke-linecap="round" stroke-dasharray="7 7"/>
  <g transform="translate(448 434)">
    <rect width="350" height="56" rx="16" fill="#0D1117" stroke="#D29922" stroke-width="1.5"/>
    <circle cx="28" cy="28" r="15" fill="#D29922"/>
    <text x="22" y="33" class="mono" fill="#0D1117">3</text>
    <text x="56" y="25" class="label">ALIGN + gas gates</text>
    <text x="56" y="41" class="body">Governance rules, token budgets, replay checks, and rate limits are enforced.</text>
  </g>
  <path d="M623 492V514" stroke="#D29922" stroke-width="3" stroke-linecap="round" stroke-dasharray="7 7"/>
  <g transform="translate(448 518)">
    <rect width="350" height="56" rx="16" fill="#0D1117" stroke="#3FB950" stroke-width="1.5"/>
    <circle cx="28" cy="28" r="15" fill="#3FB950"/>
    <text x="22" y="33" class="mono" fill="#0D1117">4</text>
    <text x="56" y="25" class="label">Route + execute</text>
    <text x="56" y="41" class="body">The MoMA Router selects a backend, then isolated workers execute safely.</text>
  </g>
  <path d="M623 576V598" stroke="#3FB950" stroke-width="3" stroke-linecap="round" stroke-dasharray="7 7"/>
  <g transform="translate(448 602)">
    <rect width="350" height="88" rx="16" fill="#0D1117" stroke="#58A6FF" stroke-width="1.5"/>
    <circle cx="28" cy="28" r="15" fill="#58A6FF"/>
    <text x="22" y="33" class="mono" fill="#0D1117">5</text>
    <text x="56" y="25" class="label">Remember + audit</text>
    <text x="56" y="41" class="body">Results are logged through ALS and can be persisted into the hot / warm / cold memory tiers.</text>
    <text x="56" y="63" class="body">This is where transparency, replayability, and forensic tracing converge.</text>
  </g>

  <rect x="856" y="152" width="280" height="620" rx="24" fill="url(#greenCard)" stroke="#30363D" filter="url(#shadow)"/>
  <text x="884" y="198" class="section">03 · Operating envelopes</text>
  <text x="884" y="224" class="caption">Three deployment tiers and three memory tiers frame how the system scales.</text>

  <text x="884" y="266" class="metric">3 deployment tiers</text>
  <text x="884" y="286" class="metricLabel">HEARTH · FORGE · SOVEREIGN</text>
  <g transform="translate(884 308)">
    <rect width="224" height="72" rx="16" fill="#161B22" stroke="#58A6FF"/>
    <text x="18" y="24" class="label">Hearth</text>
    <text x="18" y="44" class="body">Home / personal profile with the smallest gas and context envelope.</text>
    <text x="18" y="60" class="mono">1,000 gas · 8,192 tokens</text>
  </g>
  <g transform="translate(884 394)">
    <rect width="224" height="72" rx="16" fill="#161B22" stroke="#BC8CFF"/>
    <text x="18" y="24" class="label">Forge</text>
    <text x="18" y="44" class="body">Professional team profile with larger guardrails and optional orchestration extras.</text>
    <text x="18" y="60" class="mono">10,000 gas · 16,384 tokens</text>
  </g>
  <g transform="translate(884 480)">
    <rect width="224" height="72" rx="16" fill="#161B22" stroke="#3FB950"/>
    <text x="18" y="24" class="label">Sovereign</text>
    <text x="18" y="44" class="body">Enterprise / air-gapped posture with the widest context and strongest containment.</text>
    <text x="18" y="60" class="mono">100,000 gas · 32,768 tokens</text>
  </g>

  <text x="884" y="596" class="metric">3 memory tiers</text>
  <text x="884" y="616" class="metricLabel">HOT · WARM · COLD</text>
  <g transform="translate(884 636)">
    <rect width="224" height="94" rx="16" fill="#161B22" stroke="#D29922"/>
    <text x="18" y="25" class="label">Hot / Warm / Cold</text>
    <text x="18" y="46" class="body">Redis keeps active context hot, SQLite preserves semantic facts, and compressed archives preserve long horizons.</text>
    <text x="18" y="73" class="mono">&lt;1ms · ~5ms · archival</text>
  </g>
</svg>
