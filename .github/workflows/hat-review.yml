name: Hat PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  hat-review:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install uv
          uv sync --all-extras --frozen

      # Primary: Gemini API (free tier, no special permissions needed)
      # Fallback: GitHub Models (requires GH_MODELS_TOKEN PAT with models:read)
      - name: Run 11-Hat PR Review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_MODELS_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
          HAT_REVIEW_BUDGET_USD: "0.50"
        run: |
          if [ -n "$GEMINI_API_KEY" ]; then
            echo "Using Gemini API backend"
            uv run python scripts/hat_pr_review.py \
              --pr ${{ github.event.pull_request.number }} \
              --cloud-backend gemini \
              --post-as-comment \
              --output hat_review.md
          elif [ -n "$GH_MODELS_TOKEN" ]; then
            echo "Using GitHub Models backend"
            GITHUB_TOKEN="$GH_MODELS_TOKEN" uv run python scripts/hat_pr_review.py \
              --pr ${{ github.event.pull_request.number }} \
              --cloud-backend github \
              --gh-token "${{ secrets.GITHUB_TOKEN }}" \
              --post-as-comment \
              --output hat_review.md
          else
            echo "::error::No cloud API key configured. Add GEMINI_API_KEY or GH_MODELS_TOKEN as a repository secret."
            echo "Get a free Gemini key: https://aistudio.google.com/apikey"
            exit 1
          fi
        continue-on-error: true
        id: hat_review

      # If the cloud review fails, post circuit breaker fallback
      - name: Handle circuit breaker fallback
        if: steps.hat_review.outcome == 'failure'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "::warning::Hat review encountered issues. Check PR comments for details."

      - name: Upload review artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hat-review-pr${{ github.event.pull_request.number }}
          path: hat_review.md
          if-no-files-found: ignore
